gzip on;
gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=pupkin_cache:10m inactive=60m;

upstream ask_pupkin_app {
    server 127.0.0.1:8081;
}

server {
    listen 80 default_server;
    server_name localhost;
    
    location ^~ /uploads/ {
        root /home/elizaveta/hw/hw/ask_pupkin;
        expires 30d;
        access_log off;
        add_header Cache-Control "public";
    }

    location ~* \.(js|css|png|jpg|jpeg|ico|html)$ {
        root /home/elizaveta/hw/hw/ask_pupkin/static;
        expires 30d;
        access_log off;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass http://ask_pupkin_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        proxy_cache pupkin_cache;
        proxy_cache_valid 200 302 10m;
        proxy_cache_valid 404 1m;
    }
}