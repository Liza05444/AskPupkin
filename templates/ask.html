{% extends 'layouts/base.html' %}
{% load static %}
{% load bootstrap5 %}

{% block content %}
<div class="row">
    <div class="col-5">
        <h1>New Question</h1>
        <form method="POST">
            {% csrf_token %}
            {% bootstrap_form form %}
            <button type="submit" class="btn btn-primary mb-3">Ask</button>
        </form>
    </div>
</div>
{% endblock %}
