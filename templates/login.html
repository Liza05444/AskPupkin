{% extends 'layouts/base.html' %}
{% load static %}
{% load bootstrap5 %}

{% block content %}
<div class="row">
    <div class="col-5">
        <h1>Log In</h1>
        <form method="POST">
            {% csrf_token %}
            {% bootstrap_form form %}
            <button type="submit" class="btn btn-primary mb-3">Log In!</button>
        </form>
        <a href="{% url 'signup' %}">create new account</a>
    </div>
</div>
{% endblock %}
